# nginx — mymy web SPA 서빙 설정
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    # API reverse proxy → Rust backend (api container)
    location /api/ {
        proxy_pass http://api:33697;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 정적 에셋 — 장기 캐싱 (Vite 해시 파일명)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA 폴백 — 모든 라우트를 index.html 로 위임
    location / {
        try_files $uri $uri/ /index.html;
    }
}
