# ============================================================
# mymy — Docker Compose
#
# Services:
#   - db   : PostgreSQL 16 + pgvector for mymy (port 33432)
#   - web  : frontend SPA served by nginx (port 33696)
#   - api  : Rust backend (port 33697)
#
# Port range: 33xxx, reserved for local mymy services.
# ============================================================

name: mymy

services:
  # ----------------------------------------------------------
  # PostgreSQL 16 + pgvector.
  # ----------------------------------------------------------
  db:
    image: pgvector/pgvector:pg16
    container_name: mymy-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mymy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mymy}
      POSTGRES_DB: ${POSTGRES_DB:-mymy}
    ports:
      - "33432:5432"
    volumes:
      - mymy-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mymy} -d ${POSTGRES_DB:-mymy}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # Web frontend SPA.
  # ----------------------------------------------------------
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: mymy-web
    restart: unless-stopped
    ports:
      - "33696:80"
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started

  # ----------------------------------------------------------
  # API backend.
  #
  # Path-preserving mount strategy:
  # Hermes is installed as a Python venv on the host. A venv hardcodes
  # absolute paths in several places (wrapper script `exec`, binary
  # shebangs, python symlinks, pyvenv.cfg `home =`). If the host path
  # differs from the container path, the venv cannot locate itself and
  # the CLI fails with exit 127. To avoid this, we mount the host paths
  # to the SAME absolute path inside the container and set HOME to the
  # host user's home. `${HOME}` resolves per-user at compose time, so
  # this is NOT a hardcoded personal path — it works for any user with
  # a standard Hermes install (~/.hermes, ~/.local/bin).
  # ----------------------------------------------------------
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      # Use host network during build so sqlx query! macros can reach
      # the db container's published port (localhost:33432) for type checking.
      network: host
    container_name: mymy-api
    restart: unless-stopped
    # Run as the host user so hermes subprocess file permissions line up
    # (the mounted hermes venv/profiles are owned by the host uid).
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-mymy}:${POSTGRES_PASSWORD:-mymy}@db:5432/${POSTGRES_DB:-mymy}
      PORT: "33697"
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:33696}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      RUST_LOG: ${RUST_LOG:-mymy_api=info,tower_http=info}
      # Path-preserving: set HOME to the host user's home so the venv's
      # absolute paths resolve correctly inside the container.
      HOME: ${HOME}
      # Hermes paths resolve under the same HOME as on the host.
      HERMES_HOME: ${HOME}/.hermes
      HERMES_CLI_PATH: ${HOME}/.local/bin/hermes
    ports:
      - "33697:33697"
    volumes:
      # Mount host paths to the SAME absolute path so the Hermes venv's
      # hardcoded absolute references (shebangs, pyvenv.cfg, wrapper exec)
      # remain valid inside the container. ${HOME} is per-user, not a
      # hardcoded personal path.
      # These are mounted read-write because the Hermes agent runtime writes
      # to them: it installs Node.js into ~/.hermes/node/ and symlinks the
      # binary into ~/.local/bin/node, and may update the uv python cache.
      # If a path doesn't exist on the host, Docker mounts an empty dir and
      # Hermes features simply stay inactive (no crash).
      - ${HERMES_HOME:-${HOME}/.hermes}:${HOME}/.hermes
      - ${HERMES_BIN_DIR:-${HOME}/.local/bin}:${HOME}/.local/bin
      - ${UV_PYTHON_DIR:-${HOME}/.local/share/uv}:${HOME}/.local/share/uv
    depends_on:
      db:
        condition: service_healthy

volumes:
  mymy-db-data:
