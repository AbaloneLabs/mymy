# ============================================================
# mymy — GitLab CI
#
# Target runner:
#   - GitLab shell executor tagged "Ubuntu Runner"
#   - Host tools: cargo, rustfmt, clippy, cargo-audit, bun, docker, curl
#
# The Rust API uses sqlx::query! macros, so Rust compile jobs need a
# live PostgreSQL schema. Each API job starts an isolated pgvector
# container on a random localhost port, applies migrations, and cleans
# the container up in after_script.
# ============================================================

stages:
  - check
  - audit
  - build
  - test

variables:
  CARGO_TERM_COLOR: always
  POSTGRES_USER: mymy
  POSTGRES_PASSWORD: mymy
  POSTGRES_DB: mymy

.default_rules: &default_rules
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  - if: $CI_COMMIT_BRANCH

.runner_tags: &runner_tags
  tags:
    - Ubuntu Runner

.api_db_before_script: &api_db_before_script
  - |
    set -euo pipefail
    export CI_DB_CONTAINER="mymy-ci-db-${CI_JOB_ID}"

    docker rm -f "${CI_DB_CONTAINER}" >/dev/null 2>&1 || true
    docker run -d \
      --name "${CI_DB_CONTAINER}" \
      -e POSTGRES_USER="${POSTGRES_USER}" \
      -e POSTGRES_PASSWORD="${POSTGRES_PASSWORD}" \
      -e POSTGRES_DB="${POSTGRES_DB}" \
      -p 127.0.0.1::5432 \
      pgvector/pgvector:pg16

    # Wait until PostgreSQL is genuinely query-ready, not just TCP-ready.
    # pgvector's image runs init scripts (extension install) after the port
    # opens, so pg_isready alone races. Poll a real SELECT instead.
    for i in $(seq 1 90); do
      if docker exec "${CI_DB_CONTAINER}" \
           psql -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" -tAc "SELECT 1" >/dev/null 2>&1; then
        break
      fi
      if [ "$i" -eq 90 ]; then
        docker logs "${CI_DB_CONTAINER}"
        exit 1
      fi
      sleep 1
    done

    export CI_DB_PORT="$(docker port "${CI_DB_CONTAINER}" 5432/tcp | sed 's/.*://')"
    export DATABASE_URL="postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@127.0.0.1:${CI_DB_PORT}/${POSTGRES_DB}"

    # Apply migrations with a retry wrapper. The first connection from the
    # ephemeral psql container can still race the DB's final accept loop,
    # so retry the whole batch a few times until it succeeds cleanly.
    for attempt in $(seq 1 5); do
      if docker run --rm \
        --network "container:${CI_DB_CONTAINER}" \
        -e POSTGRES_USER="${POSTGRES_USER}" \
        -e POSTGRES_DB="${POSTGRES_DB}" \
        -e PGPASSWORD="${POSTGRES_PASSWORD}" \
        -v "${CI_PROJECT_DIR}/api/migrations:/migrations:ro" \
        postgres:16 \
        bash -lc 'for migration in /migrations/*.sql; do echo "Applying $(basename "$migration")"; psql -v ON_ERROR_STOP=1 -h 127.0.0.1 -U "$POSTGRES_USER" -d "$POSTGRES_DB" -f "$migration"; done'; then
        break
      fi
      if [ "$attempt" -eq 5 ]; then
        echo "Migration application failed after 5 attempts"
        docker logs "${CI_DB_CONTAINER}"
        exit 1
      fi
      echo "Migration attempt ${attempt} failed, retrying in 3s..."
      sleep 3
    done

.api_db_after_script: &api_db_after_script
  - docker rm -f "mymy-ci-db-${CI_JOB_ID}" "mymy-ci-runtime-db-${CI_JOB_ID}" "mymy-ci-api-${CI_JOB_ID}" >/dev/null 2>&1 || true
  - docker network rm "mymy-ci-net-${CI_JOB_ID}" >/dev/null 2>&1 || true

.docker_api_after_script: &docker_api_after_script
  - docker rm -f "mymy-ci-db-${CI_JOB_ID}" "mymy-ci-runtime-db-${CI_JOB_ID}" "mymy-ci-api-${CI_JOB_ID}" "mymy-ci-runner-${CI_JOB_ID}" >/dev/null 2>&1 || true
  - docker network rm "mymy-ci-net-${CI_JOB_ID}" >/dev/null 2>&1 || true
  - docker run --rm -v "${CI_PROJECT_DIR}/.ci-runner-data-${CI_JOB_ID}:/data" --entrypoint chown "mymy-api-ci:${CI_JOB_ID}" -R "$(id -u):$(id -g)" /data >/dev/null 2>&1 || true
  - docker rmi "mymy-api-ci:${CI_JOB_ID}" >/dev/null 2>&1 || true
  - rm -rf ".ci-runner-data-${CI_JOB_ID}" ".ci-runner-control-${CI_JOB_ID}"

.docker_web_after_script: &docker_web_after_script
  - docker rm -f "mymy-ci-web-${CI_JOB_ID}" >/dev/null 2>&1 || true
  - docker rmi "mymy-web-ci:${CI_JOB_ID}" >/dev/null 2>&1 || true

.browser_e2e_after_script: &browser_e2e_after_script
  - test ! -f .e2e-web.pid || kill "$(cat .e2e-web.pid)" >/dev/null 2>&1 || true
  - test ! -f .e2e-api.pid || kill "$(cat .e2e-api.pid)" >/dev/null 2>&1 || true
  - docker rm -f "mymy-ci-db-${CI_JOB_ID}" "mymy-ci-runtime-db-${CI_JOB_ID}" >/dev/null 2>&1 || true
  - rm -rf .e2e-data .e2e-api.pid .e2e-web.pid

# ============================================================
# CHECK
# ============================================================

check:repo:whitespace:
  stage: check
  <<: *runner_tags
  rules: *default_rules
  script:
    - git diff-tree --check --root -r "$CI_COMMIT_SHA"

check:compose:config:
  stage: check
  <<: *runner_tags
  rules: *default_rules
  script:
    - docker compose config --quiet

check:api:fmt:
  stage: check
  <<: *runner_tags
  rules: *default_rules
  script:
    - cd api
    - cargo fmt --all -- --check

check:api:clippy:
  stage: check
  <<: *runner_tags
  rules: *default_rules
  before_script: *api_db_before_script
  script:
    - cd api
    - cargo clippy --locked --all-targets -- -D warnings
  after_script: *api_db_after_script

check:web:lint:
  stage: check
  <<: *runner_tags
  rules: *default_rules
  script:
    - cd web
    - bun install --frozen-lockfile
    - bun run lint

# ============================================================
# AUDIT
# ============================================================

audit:api:
  stage: audit
  <<: *runner_tags
  rules: *default_rules
  script:
    - cd api
    - cargo audit --version
    # RUSTSEC-2023-0071 is pulled in through sqlx-mysql's optional RSA auth
    # dependency. This project enables only PostgreSQL sqlx features.
    - cargo audit --ignore RUSTSEC-2023-0071

audit:secrets:
  stage: audit
  <<: *runner_tags
  rules: *default_rules
  script:
    - docker run --rm -v "$CI_PROJECT_DIR:/repo:ro" ghcr.io/gitleaks/gitleaks:latest detect --source=/repo --redact --config /repo/.gitleaks.toml --exit-code 1 --log-opts="$CI_COMMIT_SHA"

audit:web:
  stage: audit
  <<: *runner_tags
  rules: *default_rules
  script:
    - cd web
    - bun install --frozen-lockfile
    - bun audit

# ============================================================
# BUILD
# ============================================================

build:api:
  stage: build
  <<: *runner_tags
  rules: *default_rules
  before_script: *api_db_before_script
  script:
    - cd api
    - cargo build --locked --bin mymy-api
  after_script: *api_db_after_script

build:web:
  stage: build
  <<: *runner_tags
  rules: *default_rules
  script:
    - cd web
    - bun install --frozen-lockfile
    - bun run build

build:docker:api:
  stage: build
  <<: *runner_tags
  rules: *default_rules
  before_script: *api_db_before_script
  script:
    - docker build --pull --provenance=mode=max --sbom=true --network host --build-arg DATABASE_URL="$DATABASE_URL" -t "mymy-api-ci:${CI_JOB_ID}" api
    - docker rm -f "mymy-ci-runtime-db-${CI_JOB_ID}" >/dev/null 2>&1 || true
    - docker network rm "mymy-ci-net-${CI_JOB_ID}" >/dev/null 2>&1 || true
    - docker network create "mymy-ci-net-${CI_JOB_ID}"
    - |
      docker run -d \
        --name "mymy-ci-runtime-db-${CI_JOB_ID}" \
        --network "mymy-ci-net-${CI_JOB_ID}" \
        --network-alias db \
        -e POSTGRES_USER="${POSTGRES_USER}" \
        -e POSTGRES_PASSWORD="${POSTGRES_PASSWORD}" \
        -e POSTGRES_DB="${POSTGRES_DB}" \
        pgvector/pgvector:pg16
    - |
      for i in $(seq 1 60); do
        if docker exec "mymy-ci-runtime-db-${CI_JOB_ID}" pg_isready -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" >/dev/null 2>&1; then
          break
        fi
        if [ "$i" -eq 60 ]; then
          docker logs "mymy-ci-runtime-db-${CI_JOB_ID}"
          exit 1
        fi
        sleep 1
      done
    - |
      mkdir -p ".ci-runner-data-${CI_JOB_ID}"
      mkdir -p ".ci-runner-control-${CI_JOB_ID}"
      chmod 711 ".ci-runner-data-${CI_JOB_ID}"
      chmod 700 ".ci-runner-control-${CI_JOB_ID}"
      docker run -d \
        --name "mymy-ci-runner-${CI_JOB_ID}" \
        --network "mymy-ci-net-${CI_JOB_ID}" \
        --network-alias sandbox-runner \
        --cap-add SYS_ADMIN \
        --security-opt seccomp=unconfined \
        --security-opt apparmor=unconfined \
        -e PORT=33698 \
        -e MYMY_SANDBOX_MODE=bubblewrap \
        -e MYMY_SANDBOX_UNSHARE_USER=true \
        -e MYMY_RUNNER_DATA_ROOT=/app/data/agent \
        -e MYMY_SANDBOX_UID=1000 \
        -e MYMY_SANDBOX_GID=1000 \
        -e MYMY_SANDBOX_RUNNER_TOKEN_FILE=/run/mymy/runner-control.token \
        -v "${CI_PROJECT_DIR}/.ci-runner-data-${CI_JOB_ID}:/app/data" \
        -v "${CI_PROJECT_DIR}/.ci-runner-control-${CI_JOB_ID}:/run/mymy" \
        --entrypoint mymy-sandbox-runner \
        "mymy-api-ci:${CI_JOB_ID}"
    - |
      docker run -d \
        --name "mymy-ci-api-${CI_JOB_ID}" \
        --network "mymy-ci-net-${CI_JOB_ID}" \
        -e DATABASE_URL="postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}" \
        -e PORT=33697 \
        -e MYMY_BIND_HOST=0.0.0.0 \
        -e MYMY_LOOPBACK_PUBLISH=true \
        -e CORS_ORIGIN=http://localhost:33696 \
        -e AUTH_COOKIE_SECURE=false \
        -e MYMY_SANDBOX_RUNNER_URL=http://sandbox-runner:33698 \
        -e MYMY_SANDBOX_RUNNER_TOKEN_FILE=/run/mymy/runner-control.token \
        -v "${CI_PROJECT_DIR}/.ci-runner-data-${CI_JOB_ID}:/app/data" \
        -v "${CI_PROJECT_DIR}/.ci-runner-control-${CI_JOB_ID}:/run/mymy:ro" \
        -p 127.0.0.1::33697 \
        "mymy-api-ci:${CI_JOB_ID}"
    - export API_PORT="$(docker port "mymy-ci-api-${CI_JOB_ID}" 33697/tcp | sed 's/.*://')"
    - |
      for i in $(seq 1 60); do
        if curl -fsS "http://127.0.0.1:${API_PORT}/api/health" >/dev/null; then
          exit 0
        fi
        if [ "$i" -eq 60 ]; then
          docker logs "mymy-ci-api-${CI_JOB_ID}"
          exit 1
        fi
        sleep 1
      done
    - |
      set -euo pipefail
      for i in $(seq 1 30); do
        if docker exec "mymy-ci-api-${CI_JOB_ID}" curl -fsS http://sandbox-runner:33698/health >/dev/null; then
          break
        fi
        if [ "$i" -eq 30 ]; then
          docker logs "mymy-ci-runner-${CI_JOB_ID}"
          exit 1
        fi
        sleep 1
      done
      UNAUTHORIZED_STATUS="$(docker exec "mymy-ci-api-${CI_JOB_ID}" \
        curl -sS -o /dev/null -w '%{http_code}' http://sandbox-runner:33698/runtime/status)"
      test "${UNAUTHORIZED_STATUS}" = "401"
      docker exec "mymy-ci-api-${CI_JOB_ID}" sh -lc '
        token=$(cat /run/mymy/runner-control.token)
        response=$(curl -fsS \
          -H "X-Mymy-Runner-Token: $token" \
          -H "Content-Type: application/json" \
          -d '\''{"executionId":"ci-runner-smoke","command":"printf runner-ok","cwd":"/app/data/agent","roots":[{"hostPath":"/app/data/agent","mountPath":"/workspace","writable":false}],"timeoutSecs":10}'\'' \
          http://sandbox-runner:33698/execute)
        test "$(printf %s "$response" | jq -r .success)" = true
        test "$(printf %s "$response" | jq -r .stdout)" = runner-ok
      '
  after_script: *docker_api_after_script

build:docker:web:
  stage: build
  <<: *runner_tags
  rules: *default_rules
  script:
    - docker build --pull --provenance=mode=max --sbom=true -t "mymy-web-ci:${CI_JOB_ID}" web
    - docker run -d --name "mymy-ci-web-${CI_JOB_ID}" --add-host=api:127.0.0.1 -p 127.0.0.1::80 "mymy-web-ci:${CI_JOB_ID}"
    - export WEB_PORT="$(docker port "mymy-ci-web-${CI_JOB_ID}" 80/tcp | sed 's/.*://')"
    - |
      for i in $(seq 1 30); do
        if curl -fsS "http://127.0.0.1:${WEB_PORT}/" | grep -q '<div id="root"></div>' \
          && curl -fsSI "http://127.0.0.1:${WEB_PORT}/" | tr -d '\r' | grep -qi "^Content-Security-Policy:.*frame-ancestors 'none'" \
          && curl -fsSI "http://127.0.0.1:${WEB_PORT}/" | tr -d '\r' | grep -qi '^X-Frame-Options: DENY$' \
          && curl -fsSI "http://127.0.0.1:${WEB_PORT}/" | tr -d '\r' | grep -qi '^X-Content-Type-Options: nosniff$'; then
          exit 0
        fi
        if [ "$i" -eq 30 ]; then
          docker logs "mymy-ci-web-${CI_JOB_ID}"
          exit 1
        fi
        sleep 1
      done
  after_script: *docker_web_after_script

# ============================================================
# TEST
# ============================================================

test:api:
  stage: test
  <<: *runner_tags
  rules: *default_rules
  before_script: *api_db_before_script
  script:
    - cd api
    - cargo test --locked
  after_script: *api_db_after_script

test:web:
  stage: test
  <<: *runner_tags
  rules: *default_rules
  script:
    - cd web
    - bun install --frozen-lockfile
    - bun run test

test:web:browser:
  stage: test
  <<: *runner_tags
  rules: *default_rules
  before_script: *api_db_before_script
  variables:
    MYMY_E2E_PIN: "e2e-owner-pin-2026"
  script:
    - |
      set -euo pipefail
      export API_PORT="$(python3 -c 'import socket; s=socket.socket(); s.bind(("127.0.0.1", 0)); print(s.getsockname()[1]); s.close()')"
      export WEB_PORT="$(python3 -c 'import socket; s=socket.socket(); s.bind(("127.0.0.1", 0)); print(s.getsockname()[1]); s.close()')"
      export MYMY_E2E_API_URL="http://127.0.0.1:${API_PORT}/api"
      export MYMY_E2E_BASE_URL="http://127.0.0.1:${WEB_PORT}"
      export MYMY_RELEASE_HARNESS_TOKEN="release-${CI_JOB_ID}-${CI_COMMIT_SHA}"
      export MYMY_RELEASE_EVIDENCE_DIR="${CI_PROJECT_DIR}/release-evidence/inputs"
      export MYMY_RELEASE_BUNDLE_DIR="${CI_PROJECT_DIR}/release-evidence/bundle"
      export RUNTIME_DB_CONTAINER="mymy-ci-runtime-db-${CI_JOB_ID}"
      mkdir -p "${MYMY_RELEASE_EVIDENCE_DIR}" "${MYMY_RELEASE_BUNDLE_DIR}"

      docker rm -f "${RUNTIME_DB_CONTAINER}" >/dev/null 2>&1 || true
      docker run -d \
        --name "${RUNTIME_DB_CONTAINER}" \
        -e POSTGRES_USER="${POSTGRES_USER}" \
        -e POSTGRES_PASSWORD="${POSTGRES_PASSWORD}" \
        -e POSTGRES_DB="${POSTGRES_DB}" \
        -p 127.0.0.1::5432 \
        pgvector/pgvector:pg16
      for i in $(seq 1 60); do
        if docker exec "${RUNTIME_DB_CONTAINER}" \
             psql -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" -tAc "SELECT 1" >/dev/null 2>&1; then
          break
        fi
        if [ "$i" -eq 60 ]; then
          docker logs "${RUNTIME_DB_CONTAINER}"
          exit 1
        fi
        sleep 1
      done
      export RUNTIME_DB_PORT="$(docker port "${RUNTIME_DB_CONTAINER}" 5432/tcp | sed 's/.*://')"
      export RUNTIME_DATABASE_URL="postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@127.0.0.1:${RUNTIME_DB_PORT}/${POSTGRES_DB}"

      cd api
      cargo build --locked --features release-harness --bin mymy-api
      mkdir -p "${CI_PROJECT_DIR}/.e2e-data/agent"
      DATABASE_URL="${RUNTIME_DATABASE_URL}" \
        PORT="${API_PORT}" \
        CORS_ORIGIN="${MYMY_E2E_BASE_URL}" \
        AUTH_COOKIE_SECURE=false \
        MYMY_INITIAL_PIN="${MYMY_E2E_PIN}" \
        MYMY_RELEASE_HARNESS_TOKEN="${MYMY_RELEASE_HARNESS_TOKEN}" \
        MYMY_AGENT_DATA_DIR="${CI_PROJECT_DIR}/.e2e-data/agent" \
        ./target/debug/mymy-api >"${CI_PROJECT_DIR}/e2e-api.log" 2>&1 &
      echo $! >"${CI_PROJECT_DIR}/.e2e-api.pid"
      cd "${CI_PROJECT_DIR}/web"
      bun install --frozen-lockfile
      VITE_API_URL="${MYMY_E2E_API_URL}" bun run build
      bun run check:delivery-budget
      bunx playwright install chromium
      bunx vite preview --host 127.0.0.1 --port "${WEB_PORT}" >"${CI_PROJECT_DIR}/e2e-web.log" 2>&1 &
      echo $! >"${CI_PROJECT_DIR}/.e2e-web.pid"

      for i in $(seq 1 90); do
        if curl -fsS "${MYMY_E2E_API_URL}/health" >/dev/null \
          && curl -fsS "${MYMY_E2E_BASE_URL}/" >/dev/null; then
          break
        fi
        if [ "$i" -eq 90 ]; then
          cat "${CI_PROJECT_DIR}/e2e-api.log"
          cat "${CI_PROJECT_DIR}/e2e-web.log"
          exit 1
        fi
        sleep 1
      done
      MYMY_E2E_PIN="${MYMY_E2E_PIN}" \
        MYMY_E2E_API_URL="${MYMY_E2E_API_URL}" \
        MYMY_E2E_BASE_URL="${MYMY_E2E_BASE_URL}" \
        MYMY_RELEASE_HARNESS_TOKEN="${MYMY_RELEASE_HARNESS_TOKEN}" \
        MYMY_RELEASE_EVIDENCE_DIR="${MYMY_RELEASE_EVIDENCE_DIR}" \
        bun run test:e2e

      cd "${CI_PROJECT_DIR}/api"
      MYMY_RELEASE_SEED="overlap-${CI_COMMIT_SHA:0:12}" \
        MYMY_RELEASE_EVIDENCE_DIR="${MYMY_RELEASE_EVIDENCE_DIR}" \
        cargo test --locked --features release-harness \
          integrated_overlap_reaches_every_durable_watermark -- --ignored --nocapture
      MYMY_RELEASE_EVIDENCE_DIR="${MYMY_RELEASE_EVIDENCE_DIR}" \
        cargo test --locked release_scope -- --nocapture

      cd "${CI_PROJECT_DIR}"
      MYMY_RELEASE_EVIDENCE_DIR="${MYMY_RELEASE_EVIDENCE_DIR}" \
        DATABASE_URL="${DATABASE_URL}" \
        scripts/verify-document-editor-interop.sh
      bun scripts/build-local-release-evidence.ts
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - e2e-api.log
      - e2e-web.log
      - web/playwright-report/
      - web/test-results/
      - release-evidence/
  after_script: *browser_e2e_after_script
