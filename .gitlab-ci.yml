# ============================================================
# mymy — GitLab CI
#
# Target runner:
#   - GitLab shell executor tagged "Ubuntu Runner"
#   - Host tools: cargo, rustfmt, clippy, bun, docker
#
# The Rust API uses sqlx::query! macros, so Rust compile jobs need a
# live PostgreSQL schema. Each API job starts an isolated pgvector
# container on a random localhost port, applies migrations, and cleans
# the container up in after_script.
# ============================================================

stages:
  - check
  - build
  - test

variables:
  CARGO_TERM_COLOR: always
  POSTGRES_USER: mymy
  POSTGRES_PASSWORD: mymy
  POSTGRES_DB: mymy

.default_rules: &default_rules
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  - if: $CI_COMMIT_BRANCH

.runner_tags: &runner_tags
  tags:
    - Ubuntu Runner

.api_db_before_script: &api_db_before_script
  - |
    set -euo pipefail
    export CI_DB_CONTAINER="mymy-ci-db-${CI_JOB_ID}"

    docker rm -f "${CI_DB_CONTAINER}" >/dev/null 2>&1 || true
    docker run -d \
      --name "${CI_DB_CONTAINER}" \
      -e POSTGRES_USER="${POSTGRES_USER}" \
      -e POSTGRES_PASSWORD="${POSTGRES_PASSWORD}" \
      -e POSTGRES_DB="${POSTGRES_DB}" \
      -p 127.0.0.1::5432 \
      pgvector/pgvector:pg16

    for i in $(seq 1 60); do
      if docker exec "${CI_DB_CONTAINER}" pg_isready -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" >/dev/null 2>&1; then
        break
      fi
      if [ "$i" -eq 60 ]; then
        docker logs "${CI_DB_CONTAINER}"
        exit 1
      fi
      sleep 1
    done

    export CI_DB_PORT="$(docker port "${CI_DB_CONTAINER}" 5432/tcp | sed 's/.*://')"
    export DATABASE_URL="postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@127.0.0.1:${CI_DB_PORT}/${POSTGRES_DB}"

    docker run --rm \
      --network "container:${CI_DB_CONTAINER}" \
      -e POSTGRES_USER="${POSTGRES_USER}" \
      -e POSTGRES_DB="${POSTGRES_DB}" \
      -e PGPASSWORD="${POSTGRES_PASSWORD}" \
      -v "${CI_PROJECT_DIR}/api/migrations:/migrations:ro" \
      postgres:16 \
      bash -lc 'for migration in /migrations/*.sql; do echo "Applying $(basename "$migration")"; psql -v ON_ERROR_STOP=1 -h 127.0.0.1 -U "$POSTGRES_USER" -d "$POSTGRES_DB" -f "$migration"; done'

.api_db_after_script: &api_db_after_script
  - docker rm -f "mymy-ci-db-${CI_JOB_ID}" >/dev/null 2>&1 || true

# ============================================================
# CHECK
# ============================================================

check:api:fmt:
  stage: check
  <<: *runner_tags
  rules: *default_rules
  script:
    - cd api
    - cargo fmt --all -- --check

check:api:clippy:
  stage: check
  <<: *runner_tags
  rules: *default_rules
  before_script: *api_db_before_script
  script:
    - cd api
    - cargo clippy --locked --all-targets -- -D warnings
  after_script: *api_db_after_script

check:web:lint:
  stage: check
  <<: *runner_tags
  rules: *default_rules
  script:
    - cd web
    - bun install --frozen-lockfile
    - bun run lint

# ============================================================
# BUILD
# ============================================================

build:api:
  stage: build
  <<: *runner_tags
  rules: *default_rules
  before_script: *api_db_before_script
  script:
    - cd api
    - cargo build --locked --bin mymy-api
  after_script: *api_db_after_script

build:web:
  stage: build
  <<: *runner_tags
  rules: *default_rules
  script:
    - cd web
    - bun install --frozen-lockfile
    - bun run build

# ============================================================
# TEST
# ============================================================

test:api:
  stage: test
  <<: *runner_tags
  rules: *default_rules
  before_script: *api_db_before_script
  script:
    - cd api
    - cargo test --locked
  after_script: *api_db_after_script
